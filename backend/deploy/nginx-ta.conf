server {
    listen 80;
    server_name _; # Ganti dengan IP VPS atau Domain Anda jika ada (contoh: api.kerawananpangan.com)

    client_max_body_size 20M;

    # Dynamic API Requests ke FastAPI Uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings untuk request ML prediction
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handling Static Uploads (misal Foto Profil Admin)
    location /uploads/ {
        alias /var/www/ta-backend/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
